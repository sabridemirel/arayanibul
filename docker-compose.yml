services:
  postgres:
    image: postgres:16-alpine
    container_name: arayanibul-db
    environment:
      POSTGRES_DB: arayanibul
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Arayanibul2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
