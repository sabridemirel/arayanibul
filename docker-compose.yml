services:
  postgres:
    image: postgres:16-alpine
    container_name: arayanibul-db
    environment:
      POSTGRES_DB: arayanibul
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Arayanibul2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./src/backend/API
      dockerfile: Dockerfile
    container_name: arayanibul-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=arayanibul;Username=postgres;Password=Arayanibul2024"
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001/api
    container_name: arayanibul-web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
